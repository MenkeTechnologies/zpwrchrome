<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05050a"/>
      <stop offset="100%" stop-color="#0d0d22"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05d9e8"/>
      <stop offset="100%" stop-color="#ff2a6d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="14" ry="14" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="12" ry="12" fill="none" stroke="url(#stroke)" stroke-width="2.5" filter="url(#glow)"/>
  <g filter="url(#glow)">
    <rect x="18" y="28" width="56" height="10" rx="2" fill="#05d9e8" opacity="0.9"/>
    <rect x="18" y="46" width="78" height="10" rx="2" fill="#05d9e8" opacity="0.6"/>
    <rect x="18" y="64" width="40" height="10" rx="2" fill="#ff2a6d"/>
    <rect x="18" y="82" width="68" height="10" rx="2" fill="#05d9e8" opacity="0.45"/>
    <rect x="18" y="100" width="32" height="10" rx="2" fill="#05d9e8" opacity="0.3"/>
  </g>
  <text x="64" y="22" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#e0f0ff" letter-spacing="2">Z://</text>
</svg>
