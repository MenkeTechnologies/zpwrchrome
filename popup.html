<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>zpwrchrome</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="modal">
    <div class="header">
      <div class="title">zpwrchrome // recent</div>
      <input class="search" type="search" placeholder="filter // url, title, host" autocomplete="off" autofocus>
      <div class="hint">
        <a href="#" id="open-scripts"   title="open userscript dashboard">scripts ▸</a> ·
        <a href="#" id="open-downloads" title="open download manager">downloads ▸</a> ·
        <a href="#" id="open-pass"      title="open pass manager (CRUD on the store)">pass ▸</a> ·
        <a href="#" id="open-find"      title="find in all open tabs (full-text search)">find ▸</a> ·
        <a href="#" id="open-lights"    title="turn off the lights — cinema-mode dimmer">lights ▸</a> ·
        Esc close
      </div>
    </div>
    <div class="body">
      <div class="cats" id="cats"></div>
      <div class="list" id="list"></div>
    </div>
    <div class="dl-strip-resizer" id="dl-strip-resizer" title="Drag to resize downloads strip" hidden></div>
    <div class="dl-strip" id="dl-strip" hidden>
      <div class="dl-strip-hd">
        <span class="dl-strip-title">downloads</span>
        <span class="dl-strip-count" id="dl-strip-count"></span>
        <a href="#" id="dl-strip-open" class="dl-strip-link" title="Open the download manager">manager ▸</a>
      </div>
      <div class="dl-strip-list" id="dl-strip-list"></div>
    </div>
    <div class="footer">
      <span><kbd>↑↓</kbd>nav</span>
      <span><kbd>Enter</kbd>switch</span>
      <span><kbd>⌘1–0</kbd>category</span>
      <span><kbd>←→</kbd>tree</span>
      <span><kbd>⌫</kbd>close tab</span>
      <span><kbd>Esc</kbd>cancel</span>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
