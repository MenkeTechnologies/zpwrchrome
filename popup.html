<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>zpwrchrome</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="modal">
    <div class="header">
      <div class="title">zpwrchrome // recent</div>
      <input class="search" type="search" placeholder="filter // url, title, host" autocomplete="off" autofocus>
      <div class="hint">
        <a href="#" id="open-scripts" title="open userscript dashboard">scripts ▸</a> · Esc close
      </div>
    </div>
    <div class="body">
      <div class="cats" id="cats"></div>
      <div class="list" id="list"></div>
    </div>
    <div class="footer">
      <span><kbd>↑↓</kbd>nav</span>
      <span><kbd>Enter</kbd>switch</span>
      <span><kbd>⌘1–6</kbd>category</span>
      <span><kbd>⌫</kbd>close tab</span>
      <span><kbd>Esc</kbd>cancel</span>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
