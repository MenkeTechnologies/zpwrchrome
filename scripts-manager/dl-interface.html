<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zpwrchrome // interface</title>
  <link rel="stylesheet" href="dl-settings.css">
</head>
<body>

<header class="topbar">
  <a class="back" href="downloads.html">‹ Back</a>
  <div class="brand">
    <span class="logo">⚙</span>
    <h1>zpwrchrome <span class="dim">interface</span></h1>
  </div>
  <div class="spacer"></div>
</header>

<div class="main">
  <aside class="sidebar">
    <nav class="cats">
      <a class="cat"        href="dl-settings.html">General</a>
      <a class="cat active" href="dl-interface.html">Interface</a>
      <a class="cat"        href="dl-extfilter.html">Extension Filter</a>
      <a class="cat"        href="dl-rules.html">Rule System</a>
      <a class="cat"        href="dl-postcommands.html">Post-download Commands</a>
      <span class="sep"></span>
      <a class="cat" href="dl-help.html">Help</a>
      <a class="cat" href="dl-about.html">About</a>
    </nav>
  </aside>

  <section class="content">
    <h2>Interface</h2>

    <fieldset>
      <legend>Language</legend>
      <p class="dt-hint">
        zpwrchrome uses your browser's UI language. Change it in
        <a href="chrome://settings/languages" style="color: var(--cyan);">chrome://settings/languages</a>.
      </p>
    </fieldset>

    <fieldset>
      <legend>Main manager</legend>
      <label class="opt"><input type="checkbox" data-key="openAsStandalone"> <span>Open downloads manager as a standalone window</span></label>
      <label class="opt"><input type="checkbox" data-key="startButtonRetriesFailed"> <span>Start button can also start failed tasks</span></label>
      <label class="opt"><input type="checkbox" data-key="slideInDetailsOnClick"> <span>Slide in Details panel when clicking on task</span></label>
      <label class="opt inline">
        <span class="lbl">Double-click on task</span>
        <select data-key="doubleClickAction">
          <option value="open-folder">Open folder</option>
          <option value="open-file">Open file</option>
          <option value="show-in-folder">Show in folder</option>
          <option value="copy-url">Copy URL</option>
        </select>
      </label>
      <label class="opt"><input type="checkbox" data-key="filePreviewAutoplay"> <span>File Preview — autoplay audio / video</span></label>
    </fieldset>

    <fieldset>
      <legend>Pop-up</legend>
      <label class="opt"><input type="checkbox" data-key="popupShowDownloadingFirst"> <span>Show downloading tasks first</span></label>
      <label class="opt"><input type="checkbox" data-key="popupCloseAfterClear"> <span>Close pop-up after clearing tasks</span></label>
      <label class="opt inline">
        <span class="lbl">Maximum items in downloading list</span>
        <input type="number" data-key="popupMaxItems" min="1" max="50" step="1">
        <span class="hint">(1-50)</span>
      </label>
      <label class="opt inline">
        <span class="lbl">Click 'Delete' button</span>
        <select data-key="popupDeleteClickAction">
          <option value="ask">Ask</option>
          <option value="delete">Always delete</option>
          <option value="never">Never delete</option>
        </select>
      </label>
    </fieldset>

    <fieldset>
      <legend>New Task Dialog</legend>
      <label class="opt"><input type="checkbox" data-key="newTaskFolderPicker"> <span>Enable folder selection</span></label>
    </fieldset>

    <fieldset>
      <legend>Menu</legend>
      <label class="opt"><input type="checkbox" data-key="menuDownloadAllResources"> <span>Download all resources on this page</span></label>
      <label class="opt"><input type="checkbox" data-key="menuSaveLinkAs"> <span>Save link as…</span></label>
      <label class="opt"><input type="checkbox" data-key="menuOneClickDownload"> <span>One-click download the link</span></label>
    </fieldset>

    <fieldset>
      <legend>Notifications</legend>
      <label class="opt"><input type="checkbox" data-key="notifyOnOneClick"> <span>Show notification when adding one-click download</span></label>
      <label class="opt"><input type="checkbox" data-key="notifyOnComplete"> <span>Show notification when download completes</span></label>
      <label class="opt"><input type="checkbox" data-key="notifyOnError"> <span>Show notification when error occurs</span></label>
      <label class="opt"><input type="checkbox" data-key="soundOnComplete"> <span>Play sound when download completes</span></label>
      <label class="opt"><input type="checkbox" data-key="soundOnError"> <span>Play sound when error occurs</span></label>
      <label class="opt"><input type="checkbox" data-key="largeImagePreview"> <span>Show large preview for images</span></label>
      <label class="opt inline">
        <span class="lbl">Clicking on a notification</span>
        <select data-key="notificationClickAction">
          <option value="open-file">Open file</option>
          <option value="open-folder">Open folder</option>
          <option value="show-in-folder">Show in folder</option>
          <option value="focus-manager">Focus manager</option>
        </select>
      </label>
    </fieldset>

    <fieldset>
      <legend>Miscellaneous</legend>
      <label class="opt"><input type="checkbox" data-key="badgeShowCount"> <span>Show number of downloading tasks over toolbar icon</span></label>
      <label class="opt inline">
        <span class="lbl">Font size</span>
        <input type="number" data-key="fontSize" min="12" max="16" step="1">
        <span class="hint">(12-16)</span>
      </label>
    </fieldset>

    <div class="actions">
      <button id="reset" class="btn-ghost">Reset to defaults</button>
      <span id="status" class="status"></span>
    </div>
  </section>
</div>

<script src="dl-interface.js" type="module"></script>
</body>
</html>
