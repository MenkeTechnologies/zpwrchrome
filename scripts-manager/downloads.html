<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zpwrchrome // downloads</title>
  <link rel="stylesheet" href="downloads.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="logo">⬇</span>
    <h1>zpwrchrome <span class="dim">downloads</span></h1>
  </div>
  <nav class="toolbar">
    <button class="tbtn" id="t-add"        title="Add URL">＋</button>
    <button class="tbtn" id="t-resume-all" title="Resume all paused">▶</button>
    <button class="tbtn" id="t-pause-all"  title="Pause all active">❚❚</button>
    <button class="tbtn" id="t-refresh"    title="Refresh">↻</button>
    <span class="tsep"></span>
    <div class="tmenu-wrap">
      <button class="tbtn" id="t-clear" title="Clear…">⌫</button>
      <div class="tmenu" id="clear-menu" hidden>
        <label class="tmenu-check"><input type="checkbox" id="cm-disk"> <span>Delete from disk</span></label>
        <div class="tmenu-sep"></div>
        <button class="tmenu-item" data-scope="missing">Clear tasks with missing files</button>
        <button class="tmenu-item" data-scope="done">Clear completed tasks</button>
        <button class="tmenu-item" data-scope="failed">Clear failed tasks</button>
        <button class="tmenu-item danger" data-scope="all">Clear all</button>
      </div>
    </div>
    <button class="tbtn danger" id="t-cancel-sel" title="Cancel selected">✕</button>
    <span class="tsep"></span>
    <a class="tbtn" id="t-settings" href="dl-settings.html" title="Settings">⚙</a>
  </nav>
  <div class="searchwrap">
    <input class="search" id="search" type="search" placeholder="search downloads…" autocomplete="off">
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <nav class="cats">
      <button class="cat active" data-cat="all">All Tasks <span class="ct" id="ct-all"></span></button>
      <button class="cat"        data-cat="recent">Recent <span class="ct" id="ct-recent"></span></button>
      <button class="cat"        data-cat="downloading">Downloading <span class="ct" id="ct-downloading"></span></button>
      <button class="cat parent" data-cat="finished">Finished <span class="ct" id="ct-finished"></span></button>
      <button class="cat sub"    data-cat="finished:image">Image <span class="ct" id="ct-image"></span></button>
      <button class="cat sub"    data-cat="finished:video">Video <span class="ct" id="ct-video"></span></button>
      <button class="cat sub"    data-cat="finished:audio">Audio <span class="ct" id="ct-audio"></span></button>
      <button class="cat sub"    data-cat="finished:document">Document <span class="ct" id="ct-doc"></span></button>
      <button class="cat sub"    data-cat="finished:archive">Archive <span class="ct" id="ct-arch"></span></button>
      <button class="cat sub"    data-cat="finished:other">Other <span class="ct" id="ct-other"></span></button>
      <button class="cat"        data-cat="failed">Failed <span class="ct" id="ct-failed"></span></button>
      <button class="cat trash"  data-cat="trash">🗑 Trash <span class="ct" id="ct-trash"></span></button>
    </nav>
  </aside>

  <section class="list" id="list" tabindex="0"></section>
</div>

<footer class="botbar">
  <span id="footer-count">0 items</span>
  <span id="footer-status" class="dim">connecting…</span>
</footer>

<script src="downloads.js" type="module"></script>
</body>
</html>
