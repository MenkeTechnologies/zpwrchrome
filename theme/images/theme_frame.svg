<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 120">
  <defs>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#070714"/>
      <stop offset="60%"  stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#05050a"/>
    </linearGradient>
    <linearGradient id="seam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#05d9e8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#05d9e8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff2a6d" stop-opacity="0"/>
    </linearGradient>
    <pattern id="frameGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#05d9e8" stroke-width="1" stroke-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1920" height="120" fill="url(#frameGrad)"/>
  <rect width="1920" height="120" fill="url(#frameGrid)"/>
  <rect x="0" y="118" width="1920" height="2" fill="url(#seam)"/>
</svg>
