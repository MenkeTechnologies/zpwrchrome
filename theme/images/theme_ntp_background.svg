<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200">
  <defs>
    <radialGradient id="g1" cx="20%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#05d9e8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#05d9e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="20%" r="50%">
      <stop offset="0%"  stop-color="#d300c5" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#d300c5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="55%" cy="85%" r="45%">
      <stop offset="0%"  stop-color="#ff2a6d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff2a6d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#05d9e8" stroke-width="1" stroke-opacity="0.06"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1200" fill="#05050a"/>
  <rect width="1920" height="1200" fill="url(#grid)"/>
  <rect width="1920" height="1200" fill="url(#g1)"/>
  <rect width="1920" height="1200" fill="url(#g2)"/>
  <rect width="1920" height="1200" fill="url(#g3)"/>

  <!-- Subtle horizontal scanlines -->
  <g opacity="0.6">
    <rect y="0"   width="1920" height="1200" fill="url(#scan)"/>
  </g>
  <defs>
    <pattern id="scan" width="1920" height="4" patternUnits="userSpaceOnUse">
      <rect width="1920" height="2" fill="transparent"/>
      <rect y="2" width="1920" height="2" fill="#05d9e8" fill-opacity="0.015"/>
    </pattern>
  </defs>

  <rect width="1920" height="1200" fill="url(#vignette)"/>

  <!-- HUD frame.
       Two concentric rings so SOMETHING is always at the viewport edges:

         * Outer ring   (50, 50 / 1870, 1150) — visible on 4K-native or
           ultrawide viewports that see most of the PNG.
         * Inner ring   (495, 315 / 1425, 885) — bracket vertices sit at
           the safe-area corners for a 1920x1080 viewport centered on
           the 3840x2400 PNG. Visible on every common Chrome window.

       Brackets at the safe-area corners look decoratively indoor on
       a true 4K full-image view, but they survive Chrome chrome eating
       the top/bottom of the image at every common resolution. -->
  <g stroke="#05d9e8" stroke-opacity="0.35" fill="none" stroke-width="1.0">
    <!-- Outer ring — only visible to viewports that see most of the PNG -->
    <path d="M 50 50 L 130 50"/>
    <path d="M 50 50 L 50 130"/>
    <path d="M 1870 50 L 1790 50"/>
    <path d="M 1870 50 L 1870 130"/>
    <path d="M 50 1150 L 130 1150"/>
    <path d="M 50 1150 L 50 1070"/>
    <path d="M 1870 1150 L 1790 1150"/>
    <path d="M 1870 1150 L 1870 1070"/>
  </g>

  <!-- Inner ring — sized for 1920x1080-or-bigger Chrome windows. Arms are
       60 SVG units (~120 px in the 3840x2400 PNG). Stroke is brighter than
       the outer ring so it carries the HUD identity at the size most users
       will actually see, but not so thick it looks heavy. -->
  <g stroke="#05d9e8" stroke-opacity="0.55" fill="none" stroke-width="1.2">
    <path d="M 495 315 L 555 315"/>
    <path d="M 495 315 L 495 375"/>
    <path d="M 1425 315 L 1365 315"/>
    <path d="M 1425 315 L 1425 375"/>
    <path d="M 495 885 L 555 885"/>
    <path d="M 495 885 L 495 825"/>
    <path d="M 1425 885 L 1365 885"/>
    <path d="M 1425 885 L 1425 825"/>
  </g>

  <!-- Sub-bracket accent dots at each safe-area corner. -->
  <g fill="#05d9e8" fill-opacity="0.6">
    <circle cx="495"  cy="315" r="2"/>
    <circle cx="1425" cy="315" r="2"/>
    <circle cx="495"  cy="885" r="2"/>
    <circle cx="1425" cy="885" r="2"/>
  </g>

  <!-- Brand caption — positioned inside the safe area so users on common
       1920x1080 windows can actually read it. -->
  <text x="510" y="345" font-family="Share Tech Mono, monospace" font-size="9" fill="#05d9e8" fill-opacity="0.7" letter-spacing="2">SYS://ZPWRCHROME</text>
  <text x="510" y="360" font-family="Share Tech Mono, monospace" font-size="7" fill="#7a8ba8" letter-spacing="1.5">// menketechnologies // hud_v2</text>
</svg>
